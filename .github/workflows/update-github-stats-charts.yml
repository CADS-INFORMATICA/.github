name: Update GitHub Stats Charts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  update-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_github_stats_svgs.py

      - name: Commit and push charts
        run: |
          if [[ -n "$(git status --porcelain assets/*.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/commit-activity.svg assets/code-frequency.svg
            git commit -m "chore(stats): update README charts"
            git push
          else
            echo "No chart changes to commit"
          fi
